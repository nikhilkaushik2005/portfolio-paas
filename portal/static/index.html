<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFolio | Automated Portfolio Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex justify-center min-h-screen p-4 py-10">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-3xl border border-gray-700 h-fit">
        <h1 class="text-4xl font-black text-white mb-2">Auto<span class="text-cyan-400">Folio</span></h1>
        <p class="text-gray-400 mb-8 font-medium">Professional PaaS Portfolio Generator</p>

        <form id="deployForm" class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block text-sm text-gray-300 mb-1">Name</label><input type="text" id="name" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2"></div>
                <div><label class="block text-sm text-gray-300 mb-1">Headline</label><input type="text" id="bio" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2"></div>
                <div class="md:col-span-2"><label class="block text-sm text-gray-300 mb-1">Top Skills (Comma separated)</label><input type="text" id="skills" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div><label class="block text-sm text-gray-300 mb-1">Resume Link (PDF)</label><input type="url" id="resume" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-sm"></div>
                <div><label class="block text-sm text-gray-300 mb-1">GitHub URL</label><input type="url" id="github" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-sm"></div>
                <div><label class="block text-sm text-gray-300 mb-1">Email Address</label><input type="email" id="email" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-sm"></div>
            </div>

            <div class="bg-gray-900/50 p-6 rounded-lg border border-cyan-700/50 mb-6">
                <h3 class="text-lg font-bold text-cyan-400 mb-3">Choose Your Design</h3>
                <select id="templateChoice" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 focus:outline-none focus:border-cyan-500 font-bold">
                    <option value="1">Template 1: Dark Mode Glass-morphism (Pro)</option>
                    <option value="2">Template 2: Retro Hacker Terminal</option>
                    <option value="3">Template 3: Premium Cyber-Glass (Animated)</option>
                    <option value="4">Template 4: Pink Editorial Minimalist portfolio</option>
                    <option value="5">Template 5: Kinetic Editorial portfolio</option>

                </select>
            </div>

            <div class="bg-gray-900/50 p-6 rounded-lg border border-gray-700">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-cyan-400">Projects</h3>
                    <button type="button" onclick="addProject()" class="text-sm bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-white">+ Add Project</button>
                </div>
                <div id="projects-container" class="space-y-4">
                    <div class="project-entry grid gap-3 p-4 bg-gray-800 border border-gray-600 rounded">
                        <input type="text" placeholder="Project Title" class="proj-title w-full bg-gray-700 rounded px-3 py-2 border border-gray-600" required>
                        <input type="text" placeholder="Short Description" class="proj-desc w-full bg-gray-700 rounded px-3 py-2 border border-gray-600" required>
                        <input type="text" placeholder="Tech Stack (e.g. AWS, Python)" class="proj-tech w-full bg-gray-700 rounded px-3 py-2 border border-gray-600" required>
                    </div>
                </div>
            </div>

            <div class="bg-gray-900/50 p-6 rounded-lg border border-gray-700">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-cyan-400">Experience</h3>
                    <button type="button" onclick="addExperience()" class="text-sm bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-white">+ Add Experience</button>
                </div>
                <div id="exp-container" class="space-y-4">
                    <div class="exp-entry grid md:grid-cols-3 gap-3 p-4 bg-gray-800 border border-gray-600 rounded">
                        <input type="text" placeholder="Role (e.g. Intern)" class="exp-role w-full bg-gray-700 rounded px-3 py-2 border border-gray-600" required>
                        <input type="text" placeholder="Organization" class="exp-org w-full bg-gray-700 rounded px-3 py-2 border border-gray-600" required>
                        <input type="text" placeholder="Duration (e.g. Jun 2025 - Aug 2025)" class="exp-date w-full bg-gray-700 rounded px-3 py-2 border border-gray-600" required>
                    </div>
                </div>
            </div>

            <button type="submit" id="deployBtn" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 text-white font-bold py-4 rounded-lg shadow-lg hover:shadow-cyan-500/30 transition-all text-lg">
                🚀 Launch Engine
            </button>
        </form>

        <div id="resultBox" class="mt-6 hidden bg-green-900 border border-green-500 p-4 rounded-lg text-center">
            <h3 class="font-bold text-green-300 animate-pulse">⚙️ Provisioning AWS Infrastructure...</h3>
            <a id="liveLink" href="#" target="_blank" class="block mt-4 text-cyan-300 font-bold underline text-lg tracking-wider"></a>
        </div>
    </div>

    <script>
        // JS to add new input blocks dynamically
        function addProject() {
            const container = document.getElementById('projects-container');
            const html = `
                <div class="project-entry grid gap-3 p-4 bg-gray-800 border border-gray-600 rounded mt-4 relative">
                    <button type="button" onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-red-400 text-xs">Remove</button>
                    <input type="text" placeholder="Project Title" class="proj-title w-full bg-gray-700 rounded px-3 py-2 border border-gray-600" required>
                    <input type="text" placeholder="Short Description" class="proj-desc w-full bg-gray-700 rounded px-3 py-2 border border-gray-600" required>
                    <input type="text" placeholder="Tech Stack" class="proj-tech w-full bg-gray-700 rounded px-3 py-2 border border-gray-600" required>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        }

        function addExperience() {
            const container = document.getElementById('exp-container');
            const html = `
                <div class="exp-entry grid md:grid-cols-3 gap-3 p-4 bg-gray-800 border border-gray-600 rounded mt-4 relative">
                    <button type="button" onclick="this.parentElement.remove()" class="absolute -top-3 -right-2 text-red-400 bg-gray-900 px-2 rounded-full text-xs border border-gray-700">X</button>
                    <input type="text" placeholder="Role" class="exp-role w-full bg-gray-700 rounded px-3 py-2 border border-gray-600" required>
                    <input type="text" placeholder="Organization" class="exp-org w-full bg-gray-700 rounded px-3 py-2 border border-gray-600" required>
                    <input type="text" placeholder="Duration" class="exp-date w-full bg-gray-700 rounded px-3 py-2 border border-gray-600" required>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        }

        document.getElementById('deployForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('deployBtn');
            btn.innerText = "Deploying..."; btn.disabled = true;

            // Extract all dynamic projects
            const projects = Array.from(document.querySelectorAll('.project-entry')).map(entry => ({
                title: entry.querySelector('.proj-title').value,
                desc: entry.querySelector('.proj-desc').value,
                tech: entry.querySelector('.proj-tech').value
            }));

            // Extract all dynamic experiences
            const experience = Array.from(document.querySelectorAll('.exp-entry')).map(entry => ({
                role: entry.querySelector('.exp-role').value,
                org: entry.querySelector('.exp-org').value,
                date: entry.querySelector('.exp-date').value
            }));

            const data = {
                template_id: document.getElementById('templateChoice').value,
                name: document.getElementById('name').value,
                bio: document.getElementById('bio').value,
                skills: document.getElementById('skills').value,
                resume: document.getElementById('resume').value,
                github: document.getElementById('github').value,
                email: document.getElementById('email').value,
                projects: projects,
                experience: experience
            };

            const formData = new FormData(); 
            formData.append('file', new Blob([JSON.stringify(data)], { type: 'application/json' }), 'student_data.json');

            try {
                const response = await fetch('/one-click-deploy', { method: 'POST', body: formData });
                const result = await response.json();
                document.getElementById('resultBox').classList.remove('hidden');
                document.getElementById('liveLink').href = result.live_url;
                document.getElementById('liveLink').innerText = result.live_url;
                btn.innerText = "🚀 Launch Engine"; btn.disabled = false;
            } catch (error) {
                alert("Error triggering deployment.");
                btn.innerText = "🚀 Launch Engine"; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
