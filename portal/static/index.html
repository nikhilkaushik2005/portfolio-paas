<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaaS Engine | Deploy Pro Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-2xl border border-gray-700 my-8">
        <h1 class="text-3xl font-bold mb-2 text-blue-400">PaaS Engine v2.0</h1>
        <p class="text-gray-400 mb-6">Deploy a professional, multi-section cloud portfolio.</p>

        <form id="deployForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-b border-gray-700 pb-6">
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-300">Name</label>
                    <input type="text" id="name" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-300">Headline</label>
                    <input type="text" id="bio" placeholder="Future Cloud Architect" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium mb-1 text-gray-300">Top Skills (Comma separated)</label>
                    <input type="text" id="skills" placeholder="AWS, Docker, Vercel, Firebase" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 border-b border-gray-700 pb-6">
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-300">Resume Link (PDF)</label>
                    <input type="url" id="resume" placeholder="https://drive.google.com/..." class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-300">GitHub URL</label>
                    <input type="url" id="github" placeholder="https://github.com/..." class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-300">Email Address</label>
                    <input type="email" id="email" placeholder="hello@example.com" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-sm">
                </div>
            </div>

            <div class="border-b border-gray-700 pb-6">
                <h3 class="text-lg font-bold text-cyan-400 mb-3">Featured Project</h3>
                <div class="space-y-3">
                    <input type="text" id="proj_title" placeholder="Project Title (e.g., AWS Rekognition Facial Analysis App)" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2">
                    <input type="text" id="proj_desc" placeholder="Short description of what you built..." class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2">
                    <input type="text" id="proj_tech" placeholder="Tech Stack (e.g., Python, AWS, HTML)" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2">
                </div>
            </div>

            <div class="pb-2">
                <h3 class="text-lg font-bold text-cyan-400 mb-3">Recent Experience / Leadership</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="exp_role" placeholder="Role (e.g., Organizer)" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2">
                    <input type="text" id="exp_org" placeholder="Organization (e.g., National Jayantian Conclave)" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2">
                </div>
            </div>

            <button type="submit" id="deployBtn" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg hover:shadow-cyan-500/30 transition-all duration-300">
                🚀 Launch Pro Portfolio to AWS
            </button>
        </form>

        <div id="resultBox" class="mt-6 hidden bg-green-900 border border-green-500 p-4 rounded-lg text-center">
            <h3 class="font-bold text-green-300 text-xl animate-pulse">⚙️ Provisioning AWS Infrastructure...</h3>
            <p class="text-sm text-green-100 mt-2">Your automated pipeline is running. Wait 2 minutes, then click below:</p>
            <a id="liveLink" href="#" target="_blank" class="block mt-4 text-cyan-300 font-bold underline text-lg tracking-wider"></a>
        </div>
    </div>

    <script>
        document.getElementById('deployForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('deployBtn');
            btn.innerText = "Deploying..."; btn.disabled = true;

            // Bundle all the new data into a structured JSON payload
            const data = {
                name: document.getElementById('name').value,
                bio: document.getElementById('bio').value,
                skills: document.getElementById('skills').value,
                resume: document.getElementById('resume').value,
                github: document.getElementById('github').value,
                email: document.getElementById('email').value,
                projects: [
                    {
                        title: document.getElementById('proj_title').value,
                        desc: document.getElementById('proj_desc').value,
                        tech: document.getElementById('proj_tech').value
                    }
                ],
                experience: [
                    {
                        role: document.getElementById('exp_role').value,
                        org: document.getElementById('exp_org').value
                    }
                ]
            };

            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const formData = new FormData(); formData.append('file', blob, 'student_data.json');

            try {
                const response = await fetch('/one-click-deploy', { method: 'POST', body: formData });
                const result = await response.json();
                document.getElementById('resultBox').classList.remove('hidden');
                document.getElementById('liveLink').href = result.live_url;
                document.getElementById('liveLink').innerText = result.live_url;
                btn.innerText = "🚀 Launch Pro Portfolio to AWS"; btn.disabled = false;
            } catch (error) {
                alert("Error triggering deployment.");
                btn.innerText = "🚀 Launch Pro Portfolio to AWS"; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
